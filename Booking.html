<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - BizConsult</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>

<header>
    <h1>BizConsult</h1>
    <nav>
         <a href="home.html">Home</a>
        <a href="gallery.html">Case Studies</a>
        <a href="Booking.html">Contact</a>
        <a href="help.html">Help</a>
        <a href="About.html">About</a>
    </nav>
</header>

<main>
<form>
    <fieldset>
        <legend>Consultation Form</legend>

        <label for="name">Full Name</label>
        <input type="text" id="name" required placeholder="Enter your full name">

        <label for="major">Business Type</label>
        <select id="major" required>
            <option value="">Choose one</option>
            <option>Startup</option>
            <option>Corporate</option>
            <option>Small Business</option>
        </select>

        <label>Gender</label>

        <div class="radio-group">
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>

        <label>Services Needed</label>

        <div class="checkbox-group">
            <input type="checkbox" id="strategy">
            <label for="strategy">Strategy</label>

            <input type="checkbox" id="finance">
            <label for="finance">Finance</label>

            <input type="checkbox" id="marketing">
            <label for="marketing">Marketing</label>
        </div>

        <label for="comments">Comments</label>
        <textarea id="comments" placeholder="Write your message here..."></textarea>

        <button type="submit">Submit</button>
    </fieldset>
</form>
</main>

<footer>
    <p>© 2026 BizConsult | Business Consulting Solutions</p>
</footer>

</body>
</html>
